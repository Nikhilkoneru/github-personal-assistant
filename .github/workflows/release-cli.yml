name: Release continuum CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: continuum
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: continuum
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: continuum
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: continuum.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release binary
        run: cargo build --release --manifest-path apps/daemon/Cargo.toml --bin continuum --target ${{ matrix.target }}

      - name: Package unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.target }}
          cp apps/daemon/target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.target }}/${{ matrix.binary }}
          tar -C dist/${{ matrix.target }} -czf dist/continuum-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.target }} | Out-Null
          Copy-Item apps/daemon/target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.target }}/${{ matrix.binary }}
          Compress-Archive -Path dist/${{ matrix.target }}/${{ matrix.binary }} -DestinationPath dist/continuum-${{ matrix.target }}.zip -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: continuum-${{ matrix.target }}
          path: dist/continuum-${{ matrix.target }}.*

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build checksums
        shell: bash
        run: |
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Cross-platform continuum CLI release." --target "${GITHUB_SHA}"
          fi
          while IFS= read -r -d '' file; do
            gh release upload "$TAG" "$file" --clobber
          done < <(find dist -type f -print0)
